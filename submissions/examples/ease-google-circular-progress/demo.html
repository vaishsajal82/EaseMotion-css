<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Circular Progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="demo-section">
    <h2 class="demo-title">Google Circular Progress</h2>
    <p class="demo-desc">Segmented ring with Google colors wrapping perfectly around the circle</p>

    <div class="circular-container">
      
      <!-- STANDARD - Animated segments -->
      <div class="circular-progress">
        <svg viewBox="0 0 40 40">
          <circle class="bg-ring" cx="20" cy="20" r="16" />
          <circle class="segment segment-blue" cx="20" cy="20" r="16" />
          <circle class="segment segment-red" cx="20" cy="20" r="16" />
          <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
          <circle class="segment segment-green" cx="20" cy="20" r="16" />
        </svg>
      </div>

      <!-- SIZE VARIANTS -->
      <div style="display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;">
        <div>
          <div class="circular-progress circular-progress-sm">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.7rem; margin-top: 0.5rem;">Small</p>
        </div>

        <div>
          <div class="circular-progress">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.7rem; margin-top: 0.5rem;">Medium</p>
        </div>

        <div>
          <div class="circular-progress circular-progress-lg">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.7rem; margin-top: 0.5rem;">Large</p>
        </div>
      </div>

      <!-- COLOR VARIANTS -->
      <div style="display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;">
        <div>
          <div class="circular-progress circular-progress-blue">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.6rem; margin-top: 0.3rem;">Blue</p>
        </div>

        <div>
          <div class="circular-progress circular-progress-red">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.6rem; margin-top: 0.3rem;">Red</p>
        </div>

        <div>
          <div class="circular-progress circular-progress-yellow">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.6rem; margin-top: 0.3rem;">Yellow</p>
        </div>

        <div>
          <div class="circular-progress circular-progress-green">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.6rem; margin-top: 0.3rem;">Green</p>
        </div>
      </div>

      <!-- ANIMATION SPEED VARIANTS -->
      <div style="display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;">
        <div>
          <div class="circular-progress circular-progress-slow">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.7rem; margin-top: 0.5rem;">Slow</p>
        </div>

        <div>
          <div class="circular-progress">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.7rem; margin-top: 0.5rem;">Normal</p>
        </div>

        <div>
          <div class="circular-progress circular-progress-fast">
            <svg viewBox="0 0 40 40">
              <circle class="bg-ring" cx="20" cy="20" r="16" />
              <circle class="segment segment-blue" cx="20" cy="20" r="16" />
              <circle class="segment segment-red" cx="20" cy="20" r="16" />
              <circle class="segment segment-yellow" cx="20" cy="20" r="16" />
              <circle class="segment segment-green" cx="20" cy="20" r="16" />
            </svg>
          </div>
          <p style="color: #94a3b8; font-size: 0.7rem; margin-top: 0.5rem;">Fast</p>
        </div>
      </div>

      <!-- Loading Label -->
      <p class="circular-label">
        <span>Loading</span>
        <span class="ellipsis">...</span>
      </p>
    </div>
  </section>
</body>
</html>
