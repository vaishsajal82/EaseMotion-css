<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Spotlight Effect</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="spotlight-card">
    <h1>Build with EaseMotion</h1>

    <p>
        Move your mouse across this card to experience a smooth interactive
        spotlight effect that follows the cursor.
    </p>
</div>

<script>
const card = document.querySelector(".spotlight-card");

card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    card.style.setProperty("--x", x + "px");
    card.style.setProperty("--y", y + "px");
});
</script>

</body>
</html>
