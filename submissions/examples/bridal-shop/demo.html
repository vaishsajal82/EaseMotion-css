<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Bridal | Wedding Accessories</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero ease-fade-in">
        <h1>Timeless Elegance for Your Special Day</h1>
        <p>Curated accessories for the modern bride.</p>
        <button class="ease-hover-scale">Shop Collection</button>
    </section>

    <section class="products">
        <h2>Bridal Essentials</h2>
        <div class="grid">
            <div class="card ease-slide-up">
                <img src="https://images.unsplash.com/photo-1594938298603-c8148c4dae35" alt="Veil">
                <h3>Hand-stitched Veil</h3>
            </div>
            <div class="card ease-slide-up">
                <img src="https://images.unsplash.com/photo-1605289982774-956fef2956e0" alt="Tiara">
                <h3>Crystal Tiara</h3>
            </div>
        </div>
    </section>

    <section class="reviews ease-fade-in">
        <h2>What Our Brides Say</h2>
        <blockquote>"The most stunning accessories I found for my wedding!"</blockquote>
    </section>

    <footer>
        <p>&copy; 2026 Ethereal Bridal. All rights reserved.</p>
    </footer>

</body>
</html>
