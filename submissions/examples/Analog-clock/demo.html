<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analog Clock</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🕐 Analog Clock</h1>
        
        <div class="clock-container">
            <canvas id="clock" width="400" height="400"></canvas>
        </div>
        
        <div class="time-display">
            <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
        </div>
        
        <div class="controls">
            <button id="toggleBtn">⏸️ Pause</button>
            <button id="resetBtn">🔄 Reset</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('clock');
        const ctx = canvas.getContext('2d');
        const hoursDisplay = document.getElementById('hours');
        const minutesDisplay = document.getElementById('minutes');
        const secondsDisplay = document.getElementById('seconds');
        const toggleBtn = document.getElementById('toggleBtn');
        const resetBtn = document.getElementById('resetBtn');

        let isRunning = true;
        let animationId = null;

        function drawClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // Update digital display
            hoursDisplay.textContent = String(hours).padStart(2, '0');
            minutesDisplay.textContent = String(minutes).padStart(2, '0');
            secondsDisplay.textContent = String(seconds).padStart(2, '0');

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 180;

            // Draw clock face
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Draw numbers (1-12)
            ctx.fillStyle = '#333';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let i = 1; i <= 12; i++) {
                const angle = (i / 12) * 2 * Math.PI - Math.PI / 2;
                const numX = centerX + Math.cos(angle) * (radius - 35);
                const numY = centerY + Math.sin(angle) * (radius - 35);
                ctx.fillText(i, numX, numY);
            }

            // Draw hour marks
            for (let i = 0; i < 60; i++) {
                const angle = (i / 60) * 2 * Math.PI - Math.PI / 2;
                const innerRadius = i % 5 === 0 ? radius - 20 : radius - 10;
                const outerRadius = radius - 5;
                
                ctx.beginPath();
                ctx.moveTo(
                    centerX + Math.cos(angle) * innerRadius,
                    centerY + Math.sin(angle) * innerRadius
                );
                ctx.lineTo(
                    centerX + Math.cos(angle) * outerRadius,
                    centerY + Math.sin(angle) * outerRadius
                );
                ctx.strokeStyle = i % 5 === 0 ? '#333' : '#999';
                ctx.lineWidth = i % 5 === 0 ? 3 : 1;
                ctx.stroke();
            }

            // Draw hour hand
            const hourAngle = ((hours % 12) / 12) * 2 * Math.PI - Math.PI / 2 + (minutes / 60) * (2 * Math.PI / 12);
            drawHand(centerX, centerY, hourAngle, radius * 0.5, 6, '#333');

            // Draw minute hand
            const minuteAngle = (minutes / 60) * 2 * Math.PI - Math.PI / 2 + (seconds / 60) * (2 * Math.PI / 60);
            drawHand(centerX, centerY, minuteAngle, radius * 0.7, 4, '#555');

            // Draw second hand
            const secondAngle = (seconds / 60) * 2 * Math.PI - Math.PI / 2;
            drawHand(centerX, centerY, secondAngle, radius * 0.75, 2, '#e74c3c');

            // Draw center dot
            ctx.beginPath();
            ctx.arc(centerX, centerY, 10, 0, 2 * Math.PI);
            ctx.fillStyle = '#333';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();

            if (isRunning) {
                animationId = requestAnimationFrame(drawClock);
            }
        }

        function drawHand(cx, cy, angle, length, width, color) {
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(
                cx + Math.cos(angle) * length,
                cy + Math.sin(angle) * length
            );
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        // Toggle clock
        toggleBtn.addEventListener('click', () => {
            isRunning = !isRunning;
            toggleBtn.textContent = isRunning ? '⏸️ Pause' : '▶️ Resume';
            
            if (isRunning) {
                drawClock();
            } else {
                cancelAnimationFrame(animationId);
            }
        });

        // Reset to current time
        resetBtn.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                toggleBtn.textContent = '⏸️ Pause';
            }
            cancelAnimationFrame(animationId);
            drawClock();
        });

        // Start clock
        drawClock();
    </script>
</body>
</html>
