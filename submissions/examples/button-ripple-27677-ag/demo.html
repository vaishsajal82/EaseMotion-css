<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Ripple Effects — EaseMotion CSS</title>
  <meta name="description" content="Visual button ripple showcase demonstrating keyframe expanding circles and micro-interaction ripples.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — SCSS Utilities</span>
      <h1>Button Ripple Effects</h1>
      <p class="description">
        Demonstrates pure CSS active state ripples. Hover and click the buttons below 
        to trigger expanding wave pulses.
      </p>
    </header>

    <main class="showcase">
      
      <!-- Purple Ripple -->
      <section class="card">
        <h3>Purple Wave</h3>
        <button class="ease-btn ripple-btn ripple-purple" type="button">Trigger Ripple</button>
      </section>

      <!-- Cyan Ripple -->
      <section class="card">
        <h3>Cyan Wave</h3>
        <button class="ease-btn ripple-btn ripple-cyan" type="button">Trigger Ripple</button>
      </section>

    </main>
  </div>

</body>
</html>
