<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Lost in Deep Space — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Core Animated 404 Component Shell ── -->
  <div class="ease-404-ak">
    
    <!-- Floating Ambient Micro-Particle Space Particles -->
    <div class="ease-404-ak__particles">
      <div class="ease-404-ak__particle"></div>
      <div class="ease-404-ak__particle"></div>
      <div class="ease-404-ak__particle"></div>
      <div class="ease-404-ak__particle"></div>
      <div class="ease-404-ak__particle"></div>
    </div>

    <div class="ease-404-ak__content">
      <!-- Floating Spatial Character Model Layer -->
      <div class="ease-404-ak__astronaut">🧑‍🚀</div>

      <!-- Glitching Matrix Coordinates -->
      <div class="ease-404-ak__number">
        <span class="ease-404-ak__digit ease-glitch-ak" data-text="4">4</span>
        <span class="ease-404-ak__digit ease-glitch-ak ease-404-ak__zero" data-text="0">0</span>
        <span class="ease-404-ak__digit ease-glitch-ak" data-text="4">4</span>
      </div>

      <h2 class="ease-404-ak__title">Houston, we have a problem!</h2>
      <p class="ease-404-ak__subtitle">
        The system parameters you are searching for have drifted into uncharted deep space.
      </p>

      <!-- CTA Navigation Return Point -->
      <a href="#earth" class="ease-404-ak__btn">
        🚀 Return to Earth
      </a>
    </div>
  </div>

</body>
</html>
