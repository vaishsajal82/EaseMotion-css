<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staggered Entrance Delays — EaseMotion CSS</title>
  <meta name="description" content="Visual transition showcase illustrating staggered entry delays and list element fade-in shifts.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — SCSS Utilities</span>
      <h1>Staggered Entrance Delays</h1>
      <p class="description">
        Demonstrates incremental animation delays. Click the trigger below 
        to restart the staggered list sequence.
      </p>
    </header>

    <main class="showcase">
      
      <!-- Replay Controller -->
      <section class="controls-card">
        <button class="ease-btn reset-btn" id="btn-replay" type="button">Replay Stagger Sequence</button>
      </section>

      <!-- Staggered Items list -->
      <div class="stagger-list" id="stagger-wrapper">
        <div class="stagger-item delay-1">📦 Package Item One</div>
        <div class="stagger-item delay-2">📦 Package Item Two</div>
        <div class="stagger-item delay-3">📦 Package Item Three</div>
        <div class="stagger-item delay-4">📦 Package Item Four</div>
      </div>

    </main>
  </div>

  <script>
    const btn = document.getElementById('btn-replay');
    const wrapper = document.getElementById('stagger-wrapper');

    btn.addEventListener('click', () => {
      // Toggle class to retrigger keyframe animation
      wrapper.classList.remove('stagger-active');
      void wrapper.offsetWidth; // Trigger reflow
      wrapper.classList.add('stagger-active');
    });

    // Initialize Active State
    wrapper.classList.add('stagger-active');
  </script>

</body>
</html>
