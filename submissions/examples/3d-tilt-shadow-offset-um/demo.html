<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Tilt Shadow Offset</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Example Card 1 -->
  <div class="demo-card ease-tilt-shadow-um">
    <div class="demo-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
        <polyline points="2 17 12 22 22 17"></polyline>
        <polyline points="2 12 12 17 22 12"></polyline>
      </svg>
    </div>
    <h3 class="demo-title">Tactile Depth</h3>
    <p class="demo-text">Hover over this card to see it lift towards you while its shadow shifts away, simulating a physical light source.</p>
  </div>

  <!-- Example Card 2 -->
  <div class="demo-card ease-tilt-shadow-um">
    <div class="demo-icon" style="background: linear-gradient(135deg, #10b981, #3b82f6);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
      </svg>
    </div>
    <h3 class="demo-title">Zero JavaScript</h3>
    <p class="demo-text">This effect relies entirely on performant CSS transforms and box-shadow transitions, ensuring a smooth 60fps interaction.</p>
  </div>

</body>
</html>
