<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Fade Scale - EaseMotion CSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-ij">
        <h1>Modal Fade Scale</h1>
        <p>A sleek modal window that fades in and scales up smoothly when triggered.</p>
        <button class="open-btn-ij" id="openModalIj">Open Modal</button>
    </div>

    <div class="mfs-overlay" id="modalOverlayIj">
        <div class="mfs-modal">
            <button class="close-btn-ij" id="closeModalIj">&times;</button>
            <h2>Hello there!</h2>
            <p>This modal fades in while scaling up from 0.9 to 1. Close it to see the reverse animation.</p>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('modalOverlayIj');
        const openBtn = document.getElementById('openModalIj');
        const closeBtn = document.getElementById('closeModalIj');

        openBtn.addEventListener('click', () => overlay.classList.add('mfs-open'));
        closeBtn.addEventListener('click', () => overlay.classList.remove('mfs-open'));
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.classList.remove('mfs-open');
        });
    </script>
</body>
</html>
