<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🔐 Password Generator</h1>
        
        <div class="password-display">
            <input type="text" id="password" readonly />
            <button id="copyBtn">📋 Copy</button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="length">Password Length: <span id="lengthValue">16</span></label>
                <input type="range" id="length" min="4" max="32" value="16" />
            </div>

            <div class="control-group">
                <label>
                    <input type="checkbox" id="uppercase" checked />
                    Uppercase (A-Z)
                </label>
                <label>
                    <input type="checkbox" id="lowercase" checked />
                    Lowercase (a-z)
                </label>
                <label>
                    <input type="checkbox" id="numbers" checked />
                    Numbers (0-9)
                </label>
                <label>
                    <input type="checkbox" id="symbols" checked />
                    Symbols (!@#$%^&*)
                </label>
            </div>

            <button id="generateBtn">Generate Password</button>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const lengthSlider = document.getElementById('length');
        const lengthValue = document.getElementById('lengthValue');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');

        const uppercase = document.getElementById('uppercase');
        const lowercase = document.getElementById('lowercase');
        const numbers = document.getElementById('numbers');
        const symbols = document.getElementById('symbols');

        const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const LOWER = 'abcdefghijklmnopqrstuvwxyz';
        const NUMBER = '0123456789';
        const SYMBOL = '!@#$%^&*()_+-=[]{}|;:,.<>?';

        function generatePassword() {
            let chars = '';
            if (uppercase.checked) chars += UPPER;
            if (lowercase.checked) chars += LOWER;
            if (numbers.checked) chars += NUMBER;
            if (symbols.checked) chars += SYMBOL;

            if (chars === '') {
                alert('Please select at least one character type!');
                return;
            }

            const length = parseInt(lengthSlider.value);
            let password = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * chars.length);
                password += chars[randomIndex];
            }
            passwordInput.value = password;
        }

        function copyPassword() {
            if (!passwordInput.value) {
                alert('Generate a password first!');
                return;
            }
            navigator.clipboard.writeText(passwordInput.value)
                .then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
                })
                .catch(() => alert('Failed to copy!'));
        }

        lengthSlider.addEventListener('input', () => {
            lengthValue.textContent = lengthSlider.value;
        });

        generateBtn.addEventListener('click', generatePassword);
        copyBtn.addEventListener('click', copyPassword);

        // Generate on page load
        window.addEventListener('load', generatePassword);
    </script>
</body>
</html>
