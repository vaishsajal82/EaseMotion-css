<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Action Button - Menu Expand</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background content just for context -->
  <div style="text-align: center; color: #94a3b8; font-family: monospace;">
    Click the FAB in the bottom right corner.
  </div>

  <!-- FAB Wrapper -->
  <div class="ease-fab-wrapper-um">
    
    <!-- Hidden checkbox to control state (Zero JS) -->
    <input type="checkbox" id="fab-toggle" class="ease-fab-toggle-um" aria-label="Toggle floating action menu">
    
    <!-- Expanding Menu Items -->
    <ul class="ease-fab-menu-um">
      <li>
        <a href="#" class="ease-fab-item-um" data-label="Create Document" aria-label="Create Document">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </a>
      </li>
      <li>
        <a href="#" class="ease-fab-item-um" data-label="Upload File" aria-label="Upload File">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </a>
      </li>
      <li>
        <a href="#" class="ease-fab-item-um" data-label="Share Link" aria-label="Share Link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
        </a>
      </li>
    </ul>

    <!-- Main FAB Button (Linked to checkbox) -->
    <label for="fab-toggle" class="ease-fab-main-um">
      <!-- Add Icon -->
      <svg class="ease-fab-icon-um ease-fab-icon-add-um" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      <!-- Close Icon -->
      <svg class="ease-fab-icon-um ease-fab-icon-close-um" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </label>

  </div>

</body>
</html>
