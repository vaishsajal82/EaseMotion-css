<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stock Ticker Bar Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, sans-serif; background: #f9fafb; padding: 40px; }
  </style>
</head>
<body>
  <h2>Stock Ticker Bar with Continuous Smooth Marquee</h2>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    function StockTickerBar({ items, speed = 30, pauseOnHover = true }) {
      const duplicated = [...items, ...items];
      return (
        <div className="ease-ticker">
          <div
            className={`ease-ticker__track ${pauseOnHover ? 'ease-ticker__track--pausable' : ''}`}
            style={{ animationDuration: `${speed}s` }}
          >
            {duplicated.map((item, index) => {
              const isUp = item.change >= 0;
              return (
                <div className="ease-ticker__item" key={`${item.symbol}-${index}`}>
                  <span className="ease-ticker__symbol">{item.symbol}</span>
                  <span className="ease-ticker__price">{item.price}</span>
                  <span className={`ease-ticker__change ${isUp ? 'ease-ticker__change--up' : 'ease-ticker__change--down'}`}>
                    <svg className="ease-ticker__arrow" viewBox="0 0 24 24" width="10" height="10" aria-hidden="true">
                      <path d="M12 4l8 8h-5v8h-6v-8H4z" />
                    </svg>
                    {Math.abs(item.change)}%
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Demo() {
      const items = [
        { symbol: 'AAPL', price: '$214.32', change: 1.24 },
        { symbol: 'GOOGL', price: '$168.91', change: -0.58 },
        { symbol: 'MSFT', price: '$421.05', change: 0.87 },
        { symbol: 'TSLA', price: '$248.77', change: -2.13 },
        { symbol: 'AMZN', price: '$186.44', change: 1.02 },
        { symbol: 'NVDA', price: '$132.19', change: 3.41 },
      ];
      return <StockTickerBar items={items} speed={20} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
