<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Feature Matrix Grid Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, sans-serif; background: #f9fafb; padding: 40px; }
  </style>
</head>
<body>
  <h2>Feature Matrix Grid with Animated Hover Glow</h2>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    function FeatureMatrixGrid({ columns, rows }) {
      return (
        <div className="ease-matrix-wrapper">
          <table className="ease-matrix">
            <thead>
              <tr>
                <th className="ease-matrix__corner" />
                {columns.map(col => (
                  <th key={col.key} className="ease-matrix__col-header">{col.label}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map(row => (
                <tr key={row.key}>
                  <th className="ease-matrix__row-header">{row.label}</th>
                  {columns.map(col => {
                    const value = row.values[col.key];
                    return (
                      <td key={col.key} className="ease-matrix__cell">
                        <div className="ease-matrix__cell-inner">
                          {typeof value === 'boolean' ? (
                            value ? (
                              <span className="ease-matrix__check" aria-label="Included">
                                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M20 6L9 17l-5-5" /></svg>
                              </span>
                            ) : (
                              <span className="ease-matrix__dash" aria-label="Not included">—</span>
                            )
                          ) : (
                            <span className="ease-matrix__text">{value}</span>
                          )}
                        </div>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function Demo() {
      const columns = [
        { key: 'starter', label: 'Starter' },
        { key: 'pro', label: 'Pro' },
        { key: 'enterprise', label: 'Enterprise' },
      ];
      const rows = [
        { key: 'users', label: 'Team members', values: { starter: '3', pro: '10', enterprise: 'Unlimited' } },
        { key: 'storage', label: 'Storage', values: { starter: '5GB', pro: '50GB', enterprise: '1TB' } },
        { key: 'support', label: 'Priority support', values: { starter: false, pro: true, enterprise: true } },
        { key: 'sso', label: 'SSO', values: { starter: false, pro: false, enterprise: true } },
      ];
      return <FeatureMatrixGrid columns={columns} rows={rows} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
