<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Split View Resizable Panel Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, sans-serif; background: #f9fafb; padding: 40px; }
    .demo-content h3 { margin-top: 0; }
  </style>
</head>
<body>
  <h2>Split View Resizable Panel with Fluid Drag Motion</h2>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useCallback, useRef, useState } = React;

    function SplitViewPanel({ left, right, defaultSplit = 50, minSize = 15, maxSize = 85, direction = 'horizontal' }) {
      const containerRef = useRef(null);
      const [split, setSplit] = useState(defaultSplit);
      const [isDragging, setIsDragging] = useState(false);

      const handlePointerMove = useCallback((e) => {
        if (!containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const isHorizontal = direction === 'horizontal';
        const pos = isHorizontal ? e.clientX - rect.left : e.clientY - rect.top;
        const size = isHorizontal ? rect.width : rect.height;
        let percent = (pos / size) * 100;
        percent = Math.min(maxSize, Math.max(minSize, percent));
        setSplit(percent);
      }, [direction, minSize, maxSize]);

      const stopDragging = useCallback(() => {
        setIsDragging(false);
        window.removeEventListener('pointermove', handlePointerMove);
        window.removeEventListener('pointerup', stopDragging);
      }, [handlePointerMove]);

      const startDragging = (e) => {
        e.preventDefault();
        setIsDragging(true);
        window.addEventListener('pointermove', handlePointerMove);
        window.addEventListener('pointerup', stopDragging);
      };

      const isHorizontal = direction === 'horizontal';

      return (
        <div ref={containerRef} className={`ease-split-view ease-split-view--${direction}`}>
          <div className="ease-split-view__pane" style={isHorizontal ? { width: `${split}%` } : { height: `${split}%` }}>
            {left}
          </div>
          <div
            className={`ease-split-view__divider ${isDragging ? 'ease-split-view__divider--active' : ''}`}
            onPointerDown={startDragging}
            role="separator"
            aria-orientation={isHorizontal ? 'vertical' : 'horizontal'}
            aria-valuenow={Math.round(split)}
            aria-valuemin={minSize}
            aria-valuemax={maxSize}
          >
            <div className="ease-split-view__grip" />
          </div>
          <div className="ease-split-view__pane" style={isHorizontal ? { width: `${100 - split}%` } : { height: `${100 - split}%` }}>
            {right}
          </div>
        </div>
      );
    }

    function Demo() {
      return (
        <SplitViewPanel
          left={<div className="demo-content"><h3>Left Pane</h3><p>Drag the divider to resize this panel.</p></div>}
          right={<div className="demo-content"><h3>Right Pane</h3><p>The layout updates fluidly as you drag.</p></div>}
          defaultSplit={50}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
